
<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Second Shadow Heist</title><link rel='stylesheet' href='styles.css'></head>
<body><div class='app'><header><div><h1>Second Shadow Heist</h1><p class='subtitle'>Collect the key and reach the vault. Your previous route becomes a ghost patrol.</p></div></header>
<div class='grid cols-2'><div class='card'><div class='stats'><div class='stat'><span>Loop</span><strong id='loopNo'></strong></div><div class='stat'><span>Status</span><strong id='status'></strong></div></div><div id='board' class='board' style='grid-template-columns:repeat(8,1fr);margin-top:14px'></div><div class='row' style='margin-top:12px'><button id='restart' class='primary'>Restart Level</button></div><p>Use arrow keys. Avoid your ghost path from the last loop.</p></div><div class='card'><h2>Log</h2><div id='log' class='log'></div></div></div></div><script src='script.js'></script></body></html>
