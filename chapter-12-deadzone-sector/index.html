
<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Deadzone Sector</title><link rel='stylesheet' href='styles.css'></head>
<body><div class='app'><header><div><h1>Deadzone Sector</h1><p class='subtitle'>Top-down shooter with enemy waves and score.</p></div></header>
<div class='grid cols-2'><div class='card'><div class='stats'><div class='stat'><span>Score</span><strong id='score'></strong></div><div class='stat'><span>Lives</span><strong id='lives'></strong></div><div class='stat'><span>Wave</span><strong id='wave'></strong></div></div><canvas id='game' width='640' height='420'></canvas><p>Move with arrow keys or WASD. Space fires.</p></div><div class='card'><h2>Log</h2><div id='log' class='log'></div></div></div></div><script src='script.js'></script></body></html>
